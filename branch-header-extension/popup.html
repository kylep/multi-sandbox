<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 12px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }
    h3 {
      margin: 0 0 8px;
    }
    input {
      width: 100%;
      padding: 6px 8px;
      font-size: 14px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .buttons {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 6px 0;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #save {
      background: #2563eb;
      color: #fff;
    }
    #clear {
      background: #e5e7eb;
      color: #333;
    }
    #status {
      margin-top: 6px;
      font-size: 12px;
      color: #666;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h3>X-Branch</h3>
  <input type="text" id="slug" placeholder="branch-slug">
  <div class="buttons">
    <button id="save">Save</button>
    <button id="clear">Clear</button>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
